name: Assign PR Owner

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    name: Assign jespinolas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Assign owner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/assignees" \
            -f assignees[]=jespinolas

          if [ "${PR_AUTHOR}" != "jespinolas" ]; then
            gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}/requested_reviewers" \
              -f reviewers[]=jespinolas
          fi
