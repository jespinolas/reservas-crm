name: Assign PR Owner

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    name: Assign jespinolas
    if: >
      github.event.pull_request.user.type != 'Bot' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Assign owner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Bot-authored PRs are intentionally skipped at the job level to avoid
          # noisy assignment notifications from automated dependency updates.
          gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/assignees" \
            -f assignees[]=jespinolas

          if [ "${PR_AUTHOR}" != "jespinolas" ]; then
            gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}/requested_reviewers" \
              -f reviewers[]=jespinolas
          fi
